[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "scoreforge"
version = "0.1.0"
description = "A tool for version controlling MuseScore files as text"
readme = "README.md"
requires-python = ">=3.8"

[project.scripts]
scoreforge = "scoreforge.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

