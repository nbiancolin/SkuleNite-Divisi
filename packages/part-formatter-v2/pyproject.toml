[project]
name = "mscz-formatter"
version = "0.1.0"
authors = [
  { name="Nicholas Biancolin", email="nicholasbiancolin@gmail.com" },
]
description = "A Python utility to process Musescore files and format the scores"
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
license = { file = "LICENSE" }

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
mscz-formatter = "mscz_formatter.main:main"

[project.urls]
Homepage = "https://github.com/nbiancolin/SkuleNite-Divisi"
Issues = "https://github.com/nbiancolin/SkuleNie-Divisi/issues"

[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mscz_formatter = ["resources/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "e2e: end-to-end runs that write inspectable output under tests/test-data/e2e/",
]
